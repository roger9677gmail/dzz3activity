# Cloud Build pipeline: build container, push to Artifact Registry, deploy to Cloud Run.
# Substitution variables (set on the Cloud Build trigger or override on submit):
#   _SERVICE_NAME       e.g. dzz3activity
#   _REGION             e.g. asia-east1
#   _AR_REPO            Artifact Registry repo name (Docker format), e.g. dzz3activity
#   _CLOUDSQL_INSTANCE  full instance connection name, e.g. PROJECT:REGION:INSTANCE
#   _DB_NAME            MySQL database name
#   _DB_USER            MySQL user
# Secret Manager (must already exist; granted to Cloud Build + Cloud Run SAs):
#   db-password         the DB password
#   smtp-password       Gmail App Password for outbound mail
#   vapid-public        Web Push VAPID public key (NEXT_PUBLIC_VAPID_PUBLIC_KEY)
#   vapid-private       Web Push VAPID private key
#   jwt-secret          random >= 32-byte string used to sign session JWTs
#                       generate with: openssl rand -base64 48
# Substitutions you can override:
#   _SMTP_USER          Gmail address used as the SMTP login / default sender
#   _SMTP_FROM          Display "From" header (defaults to _SMTP_USER if blank)
#   _VAPID_EMAIL        contact email used in mailto: subject of push messages

substitutions:
  _SERVICE_NAME: dzz3activity
  _REGION: asia-east1
  _AR_REPO: dzz3activity
  _CLOUDSQL_INSTANCE: ''
  _DB_NAME: dzz3activity
  _DB_USER: dbadmin
  _SMTP_USER: ''
  _SMTP_FROM: ''
  _VAPID_EMAIL: ''

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/vapid-public/versions/latest
      env: VAPID_PUBLIC

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # NEXT_PUBLIC_VAPID_PUBLIC_KEY must be present at `next build` time so it gets
  # inlined into the client bundle. Pass it via --build-arg from Secret Manager.
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv: ['VAPID_PUBLIC']
    args:
      - -c
      - |
        set -euo pipefail
        docker build \
          --build-arg NEXT_PUBLIC_VAPID_PUBLIC_KEY="$$VAPID_PUBLIC" \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest \
          .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --set-env-vars=DB_SOCKET_PATH=/cloudsql/${_CLOUDSQL_INSTANCE},DB_USER=${_DB_USER},DB_NAME=${_DB_NAME},SMTP_USER=${_SMTP_USER},SMTP_FROM=${_SMTP_FROM},VAPID_EMAIL=${_VAPID_EMAIL}
      - --set-secrets=DB_PASSWORD=db-password:latest,SMTP_PASSWORD=smtp-password:latest,VAPID_PRIVATE_KEY=vapid-private:latest,NEXT_PUBLIC_VAPID_PUBLIC_KEY=vapid-public:latest,JWT_SECRET=jwt-secret:latest

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
